<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
  }

  header {
    padding: 20px;
    background: #1a1a1a;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
  }

  .container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
  }

  .box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4a90e2;
    color: white;
  }

  .post {
    background: #1e1e1e;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
  }

  .meta {
    font-size: 12px;
    color: gray;
    margin-top: 5px;
  }
</style>
</head>

<body>

<header>Armigé Social</header>

<div class="container">

  <div class="box">
    <input id="postInput" placeholder="Exprime-toi sur Armigé Social...">
    <button onclick="addPost()">Publier</button>
  </div>

  <div id="feed"></div>

</div>

<script>
function getPosts() {
  try {
    return JSON.parse(localStorage.getItem("posts")) || [];
  } catch {
    return [];
  }
}

function savePosts(posts) {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function addPost() {
  const input = document.getElementById("postInput");

  if (!input.value.trim()) return;

  let posts = getPosts();

  posts.unshift({
    user: "Invité",
    text: input.value.trim(),
    time: new Date().toLocaleString()
  });

  savePosts(posts);

  input.value = "";
  renderPosts();
}

function renderPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  let posts = getPosts();

  if (posts.length === 0) {
    feed.innerHTML = "<p style='color:gray;text-align:center'>Aucun message pour le moment</p>";
    return;
  }

  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <strong>${post.user}</strong>
      <p>${post.text}</p>
      <div class="meta">${post.time}</div>
    `;

    feed.appendChild(div);
  });
}

window.onload = renderPosts;
</script>

</body>
</html>
