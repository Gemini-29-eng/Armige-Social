<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
  }

  /* LOGIN SCREEN */
  #loginScreen {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #loginBox {
    background: #1a1a1a;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
  }

  input {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    width: 200px;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4a90e2;
    color: white;
  }

  /* APP */
  header {
    padding: 20px;
    background: #1a1a1a;
    text-align: center;
    font-size: 22px;
  }

  .container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
  }

  .panel {
    background: #161616;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
  }

  .post {
    background: #1e1e1e;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
  }

  .username {
    color: #4a90e2;
    font-weight: bold;
  }

  .meta {
    font-size: 12px;
    color: gray;
  }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div id="loginBox">
    <h2>Armigé Social</h2>
    <p>Connexion requise</p>
    <input id="loginInput" placeholder="Ton pseudo">
    <br>
    <button onclick="login()">Entrer</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>Armigé Social</header>

<div class="container">

  <div class="panel">
    <p id="currentUser"></p>
  </div>

  <div class="panel">
    <input id="postInput" placeholder="Exprime-toi...">
    <button onclick="addPost()">Publier</button>
  </div>

  <div id="feed"></div>

</div>

</div>

<script>
let user = null;

/* LOGIN */
function login() {
  const input = document.getElementById("loginInput");

  if (!input.value.trim()) return;

  user = input.value.trim();
  localStorage.setItem("user", user);

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("currentUser").textContent =
    "Connecté en tant que : " + user;

  renderPosts();
}

/* AUTO LOGIN */
window.onload = function () {
  const savedUser = localStorage.getItem("user");

  if (savedUser) {
    user = savedUser;

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("currentUser").textContent =
      "Connecté en tant que : " + user;

    renderPosts();
  }
};

/* POSTS */
function getPosts() {
  return JSON.parse(localStorage.getItem("posts")) || [];
}

function savePosts(posts) {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function addPost() {
  const input = document.getElementById("postInput");

  if (!input.value.trim()) return;

  let posts = getPosts();

  posts.unshift({
    user: user,
    text: input.value.trim(),
    time: new Date().toLocaleString()
  });

  savePosts(posts);

  input.value = "";
  renderPosts();
}

function renderPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  let posts = getPosts();

  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="username">${post.user}</div>
      <div>${post.text}</div>
      <div class="meta">${post.time}</div>
    `;

    feed.appendChild(div);
  });
}
</script>

</body>
</html>
