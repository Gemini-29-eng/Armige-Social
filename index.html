<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Armigé Social</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    .post {
      background: #1e1e1e;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      text-align: left;
    }
  </style>
</head>

<body>

<h1>Armigé Social</h1>

<input id="postInput" placeholder="Exprime-toi...">
<button onclick="addPost()">Publier</button>

<div id="feed"></div>

<script>
function getPosts() {
  try {
    return JSON.parse(localStorage.getItem("posts")) || [];
  } catch {
    return [];
  }
}

function savePosts(posts) {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function addPost() {
  const input = document.getElementById("postInput");

  if (!input || !input.value.trim()) return;

  let posts = getPosts();

  posts.unshift({
    user: "Invité",
    text: input.value.trim(),
    time: new Date().toLocaleString()
  });

  savePosts(posts);

  input.value = "";
  renderPosts();
}

function renderPosts() {
  const feed = document.getElementById("feed");
  if (!feed) return;

  feed.innerHTML = "";

  let posts = getPosts();

  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <strong>${post.user}</strong><br>
      ${post.text}<br>
      <small>${post.time}</small>
    `;

    feed.appendChild(div);
  });
}

window.onload = renderPosts;
</script>

</body>
</html>
