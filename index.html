<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>

/* 🌌 BACKGROUND */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e, #16213e);
  height: 100vh;
}

/* 💧 GLASS */
.glass {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 16px;
}

/* 🔐 LOGIN */
#loginScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

#loginBox {
  padding: 30px;
  text-align: center;
  width: 320px;
}

input {
  width: 90%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

button {
  margin-top: 15px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(74,144,226,0.8);
  color: white;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* 🌐 APP */
#app {
  display: none;
}

/* HEADER */
header {
  padding: 18px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
}

/* 📦 MAIN LAYOUT */
.main {
  display: flex;
}

/* 📂 SIDEBAR */
.sidebar {
  position: fixed;
  left: 15px;
  top: 90px;
  width: 180px;
  padding: 15px;
}

.category {
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
  font-size: 14px;
}

.category:hover {
  background: rgba(255,255,255,0.12);
  transform: scale(1.05);
}

/* 📰 CONTAINER */
.container {
  max-width: 600px;
  margin-left: 220px;
  padding: 20px;
}

/* POST BOX */
.postBox {
  padding: 15px;
  margin-top: 15px;
}

/* POST */
.post {
  margin-top: 12px;
  padding: 15px;
}

.username {
  color: #4da3ff;
  font-weight: bold;
}

.meta {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 5px;
}

/* EMPTY */
.empty {
  text-align: center;
  opacity: 0.5;
  margin-top: 20px;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
  <div id="loginBox" class="glass">
    <h2>Armigé Social</h2>
    <p>Connexion requise</p>

    <input id="loginInput" placeholder="Ton pseudo">
    <button onclick="login()">Entrer</button>
  </div>
</div>

<!-- 🌐 APP -->
<div id="app">

<header class="glass">Armigé Social</header>

<!-- 📂 SIDEBAR -->
<div class="sidebar glass">
  <div class="category">🏠 Accueil</div>
  <div class="category">🔥 Tendances</div>
  <div class="category">📰 Actualités</div>
  <div class="category">🎮 Gaming</div>
  <div class="category">🎵 Musique</div>
  <div class="category">🌍 Monde</div>
</div>

<!-- 📰 MAIN -->
<div class="container">

  <div class="postBox glass">
    <p id="userDisplay"></p>

    <input id="postInput" placeholder="Exprime-toi...">
    <button onclick="addPost()">Publier</button>
  </div>

  <div id="feed"></div>

</div>

</div>

<script>

let user = null;

/* 🔐 LOGIN */
function login() {
  const input = document.getElementById("loginInput");
  if (!input.value.trim()) return;

  user = input.value.trim();
  localStorage.setItem("user", user);

  startApp();
}

/* AUTO LOGIN */
window.onload = function () {
  const saved = localStorage.getItem("user");
  if (saved) {
    user = saved;
    startApp();
  }
};

function startApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userDisplay").textContent =
    "Connecté : " + user;

  renderPosts();
}

/* 📦 POSTS */
function getPosts() {
  return JSON.parse(localStorage.getItem("posts")) || [];
}

function savePosts(posts) {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function addPost() {
  const input = document.getElementById("postInput");
  if (!input.value.trim()) return;

  let posts = getPosts();

  posts.unshift({
    user: user,
    text: input.value.trim(),
    time: new Date().toLocaleString()
  });

  savePosts(posts);
  input.value = "";
  renderPosts();
}

function renderPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  let posts = getPosts();

  if (posts.length === 0) {
    feed.innerHTML = "<div class='empty'>Aucun post pour le moment</div>";
    return;
  }

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post glass";

    div.innerHTML = `
      <div class="username">${p.user}</div>
      <div>${p.text}</div>
      <div class="meta">${p.time}</div>
    `;

    feed.appendChild(div);
  });
}

</script>

</body>
</html>
