<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f6f4ff;
}

/* APP */
.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #ffffff;
  border-right: 1px solid #e7e3ff;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #7c5cff; /* violet lavande */
  margin-bottom: 20px;
}

/* NAV BUTTONS */
.nav-btn {
  background: transparent;
  border: none;
  padding: 12px;
  text-align: left;
  font-size: 15px;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.2s;
  color: #333;
}

.nav-btn:hover {
  background: #f0ecff;
  transform: translateX(3px);
}

.nav-btn.active {
  background: #7c5cff;
  color: white;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
}

/* POST BOX */
.post-box {
  background: white;
  padding: 15px;
  border-radius: 14px;
  border: 1px solid #e7e3ff;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(124,92,255,0.08);
}

.post-box input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
}

/* POST */
.post {
  background: white;
  padding: 15px;
  border-radius: 14px;
  border: 1px solid #e7e3ff;
  margin-bottom: 15px;
  transition: 0.2s;
  box-shadow: 0 5px 15px rgba(124,92,255,0.05);
}

.post:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(124,92,255,0.12);
}

.user {
  font-weight: bold;
  color: #7c5cff;
  margin-bottom: 5px;
}

.text {
  color: #333;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 15px;
  font-size: 14px;
  color: #666;
}

.actions span {
  cursor: pointer;
  transition: 0.2s;
}

.actions span:hover {
  color: #7c5cff;
}
</style>

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">Armigé</div>

    <button class="nav-btn active">🏠 Accueil</button>
    <button class="nav-btn">🔎 Explorer</button>
    <button class="nav-btn">💬 Messages</button>
    <button class="nav-btn">👤 Profil</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- POST INPUT -->
    <div class="post-box">
      <input type="text" placeholder="Exprime-toi..." />
    </div>

    <!-- POSTS -->
    <div class="post">
      <div class="user">Armigé System</div>
      <div class="text">Bienvenue sur Armigé Social 💜</div>
      <div class="actions">
        <span>❤️ Like</span>
        <span>💬 Comment</span>
        <span>🔁 Share</span>
      </div>
    </div>

    <div class="post">
      <div class="user">Utilisateur</div>
      <div class="text">Test du nouveau design lavande ✨</div>
      <div class="actions">
        <span>❤️ Like</span>
        <span>💬 Comment</span>
        <span>🔁 Share</span>
      </div>
    </div>

  </div>

</div>

</body>
</html>
