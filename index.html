<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Armigé Social</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }
    .post-box {
      margin-top: 20px;
    }
    input {
      padding: 10px;
      width: 250px;
    }
    button {
      padding: 10px;
      cursor: pointer;
    }
    .post {
      background: #1e1e1e;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Armigé Social</h1>
<p>Réseau social en construction</p>

<div class="post-box">
  <input id="postInput" placeholder="Exprime-toi...">
  <button onclick="addPost()">Publier</button>
</div>

<div id="feed"></div>

<script>
function addPost() {
  const text = document.getElementById("postInput").value;

  if (!text) return;

  const div = document.createElement("div");
  div.className = "post";
  div.textContent = text;

  document.getElementById("feed").prepend(div);

  document.getElementById("postInput").value = "";
}
</script>

</body>
</html>
