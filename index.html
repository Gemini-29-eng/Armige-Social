<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* BACKGROUND LOGIN */
body {
  background: #f6f4ff;
}

/* LOGIN SCREEN */
#auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-box {
  background: white;
  padding: 30px;
  border-radius: 16px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(124,92,255,0.15);
  text-align: center;
}

.auth-box h1 {
  color: #7c5cff;
  margin-bottom: 20px;
}

.auth-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
}

.auth-box button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #7c5cff;
  color: white;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.2s;
}

.auth-box button:hover {
  background: #6846ff;
}

.switch {
  margin-top: 10px;
  font-size: 13px;
  color: #666;
  cursor: pointer;
}

/* APP */
.app {
  display: none;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #ffffff;
  border-right: 1px solid #e7e3ff;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #7c5cff;
  margin-bottom: 20px;
}

/* NAV */
.nav-btn {
  background: transparent;
  border: none;
  padding: 12px;
  text-align: left;
  font-size: 15px;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.2s;
  color: #333;
}

.nav-btn:hover {
  background: #f0ecff;
  transform: translateX(3px);
}

.nav-btn.active {
  background: #7c5cff;
  color: white;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
}

/* POST */
.post {
  background: white;
  padding: 15px;
  border-radius: 14px;
  border: 1px solid #e7e3ff;
  margin-bottom: 15px;
  box-shadow: 0 5px 15px rgba(124,92,255,0.05);
}

.user {
  font-weight: bold;
  color: #7c5cff;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 15px;
  font-size: 14px;
  color: #666;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="auth">

  <div class="auth-box" id="loginBox">
    <h1>Armigé</h1>
    <input id="loginUser" placeholder="Pseudo">
    <input id="loginPass" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <div class="switch" onclick="toggleAuth()">Créer un compte</div>
  </div>

  <div class="auth-box" id="registerBox" style="display:none;">
    <h1>Créer compte</h1>
    <input id="regUser" placeholder="Pseudo">
    <input id="regPass" type="password" placeholder="Mot de passe">
    <button onclick="register()">Créer le compte</button>
    <div class="switch" onclick="toggleAuth()">Déjà un compte ?</div>
  </div>

</div>

<!-- APP -->
<div class="app" id="app">

  <div class="sidebar">
    <div class="logo">Armigé</div>

    <button class="nav-btn active" data-page="home">🏠 Accueil</button>
    <button class="nav-btn" data-page="explore">🔎 Explorer</button>
    <button class="nav-btn" data-page="messages">💬 Messages</button>
    <button class="nav-btn" data-page="profile">👤 Profil</button>
    <button class="nav-btn" onclick="logout()">🚪 Déconnexion</button>
  </div>

  <div class="content" id="content">

    <div class="post">
      <div class="user">Armigé System</div>
      <div>Bienvenue 💜</div>
      <div class="actions">
        <span>❤️ Like</span>
        <span>💬 Comment</span>
        <span>🔁 Share</span>
      </div>
    </div>

  </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("armige_users") || "[]");
let currentUser = null;

/* SWITCH LOGIN / REGISTER */
function toggleAuth() {
  document.getElementById("loginBox").style.display =
    document.getElementById("loginBox").style.display === "none" ? "block" : "none";

  document.getElementById("registerBox").style.display =
    document.getElementById("registerBox").style.display === "none" ? "block" : "none";
}

/* REGISTER */
function register() {
  const u = document.getElementById("regUser").value;
  const p = document.getElementById("regPass").value;

  if (!u || !p) return alert("Remplis tout");

  users.push({ user: u, pass: p });
  localStorage.setItem("armige_users", JSON.stringify(users));

  alert("Compte créé !");
  toggleAuth();
}

/* LOGIN */
function login() {
  const u = document.getElementById("loginUser").value;
  const p = document.getElementById("loginPass").value;

  const found = users.find(x => x.user === u && x.pass === p);

  if (!found) return alert("Erreur connexion");

  currentUser = found;

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

/* LOGOUT */
function logout() {
  currentUser = null;
  document.getElementById("auth").style.display = "flex";
  document.getElementById("app").style.display = "none";
}
</script>

</body>
</html>
