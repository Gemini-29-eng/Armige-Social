<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
  }

  header {
    padding: 20px;
    background: #1a1a1a;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
  }

  .container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
  }

  .panel {
    background: #161616;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
  }

  input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    width: 70%;
    margin-right: 5px;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4a90e2;
    color: white;
  }

  .post {
    background: #1e1e1e;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    text-align: left;
  }

  .meta {
    font-size: 12px;
    color: gray;
    margin-top: 5px;
  }

  .username {
    color: #4a90e2;
    font-weight: bold;
  }

  .empty {
    text-align: center;
    color: gray;
  }
</style>
</head>

<body>

<header>Armigé Social</header>

<div class="container">

  <!-- PROFIL -->
  <div class="panel">
    <input id="usernameInput" placeholder="Ton pseudo">
    <button onclick="saveUser()">Créer profil</button>
    <p id="currentUser" style="color:gray;margin-top:10px;"></p>
  </div>

  <!-- POST -->
  <div class="panel">
    <input id="postInput" placeholder="Exprime-toi sur Armigé Social...">
    <button onclick="addPost()">Publier</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script>
function getUser() {
  return localStorage.getItem("user") || "Invité";
}

function saveUser() {
  const input = document.getElementById("usernameInput");

  if (!input.value.trim()) return;

  localStorage.setItem("user", input.value.trim());
  renderUser();
}

function renderUser() {
  const display = document.getElementById("currentUser");
  display.textContent = "Connecté en tant que : " + getUser();
}

function getPosts() {
  try {
    return JSON.parse(localStorage.getItem("posts")) || [];
  } catch {
    return [];
  }
}

function savePosts(posts) {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function addPost() {
  const input = document.getElementById("postInput");

  if (!input.value.trim()) return;

  let posts = getPosts();

  posts.unshift({
    user: getUser(),
    text: input.value.trim(),
    time: new Date().toLocaleString()
  });

  savePosts(posts);

  input.value = "";
  renderPosts();
}

function renderPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  let posts = getPosts();

  if (posts.length === 0) {
    feed.innerHTML = "<p class='empty'>Aucun message pour le moment</p>";
    return;
  }

  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="username">${post.user}</div>
      <div>${post.text}</div>
      <div class="meta">${post.time}</div>
    `;

    feed.appendChild(div);
  });
}

window.onload = function() {
  renderUser();
  renderPosts();
};
</script>

</body>
</html>
