<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #f6f4ff;
  animation: fadePage 0.4s ease;
}

/* PAGE FADE */
@keyframes fadePage {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* LOADER */
#loader {
  position: fixed;
  inset: 0;
  background: #f6f4ff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.4s ease;
}

.loader-box {
  text-align: center;
}

.logo-load {
  font-size: 30px;
  font-weight: bold;
  color: #7c5cff;
  animation: pulse 1.5s infinite;
}

.text-load {
  margin-top: 10px;
  color: #555;
}

.bar {
  width: 200px;
  height: 6px;
  background: #e7e3ff;
  margin-top: 15px;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.bar::after {
  content: "";
  position: absolute;
  width: 50%;
  height: 100%;
  background: #7c5cff;
  animation: load 1s infinite;
}

/* ANIMATIONS */
@keyframes load {
  0% { left: -50%; }
  50% { left: 25%; }
  100% { left: 100%; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.06); }
  100% { transform: scale(1); }
}

/* APP */
.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: white;
  border-right: 1px solid #e7e3ff;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* LOGO */
.logo {
  font-size: 22px;
  font-weight: bold;
  color: #7c5cff;
  cursor: pointer;
  transition: 0.2s;
}

.logo:hover {
  transform: scale(1.05);
}

/* NAV */
.nav-btn {
  padding: 12px;
  border: none;
  background: transparent;
  text-align: left;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.nav-btn:hover {
  background: #f0ecff;
  transform: translateX(4px);
}

.nav-btn.active {
  background: #7c5cff;
  color: white;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  border-radius: 14px;
  border: 1px solid #e7e3ff;
  margin-bottom: 15px;
  animation: cardIn 0.3s ease;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(124,92,255,0.15);
}

/* CARD ANIM */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* TITLE */
.title {
  font-weight: bold;
  color: #7c5cff;
  margin-bottom: 10px;
}

/* SEARCH */
.search-bar input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #7c5cff;
  margin-bottom: 20px;
  transition: 0.2s;
}

.search-bar input:focus {
  outline: none;
  transform: scale(1.01);
  box-shadow: 0 0 10px rgba(124,92,255,0.25);
}

/* GRID */
.profile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 15px;
}

/* INPUT */
.input {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON */
.save-btn {
  margin-top: 10px;
  padding: 10px;
  background: #7c5cff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* NON DEVELOPPE */
.not-developed {
  font-size: 14px;
  color: #555;
  line-height: 1.6;
}

.franc {
  color: #7c5cff;
  font-weight: bold;
}

</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-box">
    <div class="logo-load">Armigé</div>
    <div class="text-load">Chargement du réseau...</div>
    <div class="bar"></div>
  </div>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo" onclick="goHome()">Armigé</div>

    <button class="nav-btn active" data-page="home">Accueil</button>
    <button class="nav-btn" data-page="explore">Explorer</button>
    <button class="nav-btn" data-page="messages">Messages</button>
    <button class="nav-btn" data-page="profile">Profil</button>

    <hr>

    <button class="nav-btn" data-page="actualites">Actualités</button>
    <button class="nav-btn" data-page="culture">Culture</button>
    <button class="nav-btn" data-page="divertissement">Divertissement</button>
    <button class="nav-btn" data-page="apps">Autres Apps</button>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>

</div>

<script>

/* LOADER SAFE */
function hideLoader() {
  const loader = document.getElementById("loader");
  if (!loader) return;
  loader.style.opacity = "0";
  setTimeout(() => loader.style.display = "none", 300);
}
setTimeout(hideLoader, 1000);

/* NAV */
const buttons = document.querySelectorAll(".nav-btn");
const content = document.getElementById("content");

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadPage(btn.dataset.page);
  });
});

/* LOAD */
function loadPage(page) {

  if (page === "profile") {
    renderProfile();
    return;
  }

  content.innerHTML = `
    <div class="search-bar">
      <input type="text" placeholder="Rechercher sur Armigé...">
    </div>

    <div class="card">
      <div class="title">${page}</div>
      <div class="not-developed">
        *Page non-développée*<br><br>
        Désolé, mais cette page n'est pas développée.<br>
        Son fonctionnement est annoncé pour prochainement.<br><br>
        - <span class="franc">Franc Suisse</span> -
      </div>
    </div>
  `;
}

/* HOME */
function goHome() {
  loadPage("home");
}

/* PROFILE */
function renderProfile() {

  const name = localStorage.getItem("armige_name") || "Invité";
  const lang = localStorage.getItem("armige_lang") || "Français";

  content.innerHTML = `

    <div class="card">
      <div class="title">Compte</div>

      Nom :
      <input class="input" id="nameInput" value="${name}"><br>

      Langue :
      <input class="input" id="langInput" value="${lang}"><br>

      <button class="save-btn" onclick="saveProfile()">Enregistrer</button>
    </div>

    <div class="profile-grid">

      <div class="card"><div class="title">Historique</div><div>Aucune activité.</div></div>
      <div class="card"><div class="title">Publications</div><div>Aucune publication.</div></div>
      <div class="card"><div class="title">Contacts</div><div>Aucun contact.</div></div>
      <div class="card"><div class="title">Préférences</div><div>Paramètres utilisateur</div></div>
      <div class="card"><div class="title">Abonnements</div><div>Aucun abonnement</div></div>

    </div>
  `;
}

/* SAVE */
function saveProfile() {
  localStorage.setItem("armige_name", document.getElementById("nameInput").value);
  localStorage.setItem("armige_lang", document.getElementById("langInput").value);
  alert("Profil mis à jour !");
}

</script>

</body>
</html>
