<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>

/* 🌈 BACKGROUND */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f6f8ff, #ffffff, #eef3ff);
  color: #111;
}

/* 💎 GLASS */
.glass {
  background: rgba(255,255,255,0.7);
  border: 1px solid rgba(0,0,0,0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* 🔐 LOGIN */
#loginScreen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

#loginBox {
  width: 360px;
  padding: 40px;
  text-align: center;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(0,0,0,0.05);
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: #111;
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

/* 🌐 APP */
#app {
  display: none;
}

/* HEADER */
header {
  padding: 18px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* 📦 LAYOUT */
.layout {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

/* 📂 SIDEBAR */
.sidebar {
  width: 200px;
  padding: 15px;
  position: sticky;
  top: 80px;
  height: fit-content;
}

.category {
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 12px;
  cursor: pointer;
}

.category:hover {
  background: rgba(0,0,0,0.06);
}

/* 📰 FEED */
.feed {
  width: 650px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* POST */
.post {
  padding: 15px;
  animation: fadeUp 0.3s ease;
}

.username {
  color: #2b6cff;
  font-weight: bold;
}

.meta {
  font-size: 11px;
  opacity: 0.5;
  margin-top: 5px;
}

/* ❤️ LIKE */
.likeRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.likeBtn {
  cursor: pointer;
  user-select: none;
  font-size: 14px;
  transition: 0.2s;
}

.likeBtn:hover {
  transform: scale(1.1);
}

.likeActive {
  color: red;
  transform: scale(1.2);
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
  <div id="loginBox" class="glass">
    <h2>Armigé Social</h2>
    <input id="loginInput" placeholder="Pseudo">
    <button onclick="login()">Entrer</button>
  </div>
</div>

<!-- 🌐 APP -->
<div id="app">

<header class="glass">Armigé Social</header>

<div class="layout">

  <!-- 📂 SIDEBAR -->
  <div class="sidebar glass">
    <div class="category">🏠 Accueil</div>
    <div class="category">🔥 Tendances</div>
    <div class="category">📰 Actualités</div>
    <div class="category">🎮 Gaming</div>
    <div class="category">🎵 Musique</div>
  </div>

  <!-- 📰 FEED -->
  <div class="feed">

    <div class="postBox glass">
      <p id="userDisplay"></p>
      <input id="postInput" placeholder="Exprime-toi...">
      <button onclick="addPost()">Publier</button>
    </div>

    <div id="feed"></div>

  </div>

</div>

</div>

<script>

let user = null;

/* LOGIN */
function login() {
  const input = document.getElementById("loginInput");
  if (!input.value.trim()) return;

  user = input.value.trim();
  localStorage.setItem("user", user);

  startApp();
}

/* AUTO LOGIN */
window.onload = function () {
  const saved = localStorage.getItem("user");
  if (saved) {
    user = saved;
    startApp();
  }
};

function startApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userDisplay").textContent =
    "Connecté : " + user;

  renderPosts();
}

/* POSTS */
function getPosts() {
  return JSON.parse(localStorage.getItem("posts")) || [];
}

function savePosts(posts) {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function addPost() {
  const input = document.getElementById("postInput");
  if (!input.value.trim()) return;

  let posts = getPosts();

  posts.unshift({
    id: Date.now(),
    user: user,
    text: input.value.trim(),
    time: new Date().toLocaleString(),
    likes: 0,
    likedBy: []
  });

  savePosts(posts);
  input.value = "";
  renderPosts();
}

/* ❤️ LIKE */
function toggleLike(id) {
  let posts = getPosts();

  posts = posts.map(p => {
    if (p.id === id) {

      if (!p.likedBy.includes(user)) {
        p.likes += 1;
        p.likedBy.push(user);
      } else {
        p.likes -= 1;
        p.likedBy = p.likedBy.filter(u => u !== user);
      }
    }
    return p;
  });

  savePosts(posts);
  renderPosts();
}

/* RENDER */
function renderPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  let posts = getPosts();

  posts.forEach(p => {

    const isLiked = p.likedBy.includes(user);

    const div = document.createElement("div");
    div.className = "post glass";

    div.innerHTML = `
      <div class="username">${p.user}</div>
      <div>${p.text}</div>

      <div class="likeRow">
        <div class="meta">${p.time}</div>

        <div class="likeBtn ${isLiked ? "likeActive" : ""}"
             onclick="toggleLike(${p.id})">
          ❤️ ${p.likes}
        </div>
      </div>
    `;

    feed.appendChild(div);
  });
}

</script>

</body>
</html>
