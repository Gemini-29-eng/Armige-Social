<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f6f4ff;
}

/* APP */
.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: white;
  border-right: 1px solid #e7e3ff;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #7c5cff;
  margin-bottom: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.logo:hover {
  transform: scale(1.05);
  text-shadow: 0 5px 15px rgba(124,92,255,0.4);
}

/* NAV */
.nav-btn {
  background: transparent;
  border: none;
  padding: 12px;
  text-align: left;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.nav-btn:hover {
  background: #f0ecff;
  transform: translateX(5px);
}

.nav-btn.active {
  background: #7c5cff;
  color: white;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
}

/* SEARCH */
.search-bar {
  width: 100%;
  margin-bottom: 20px;
}

.search-bar input {
  width: 100%;
  padding: 12px 15px;
  border-radius: 12px;
  border: 2px solid #7c5cff;
  outline: none;
  font-size: 14px;
  transition: 0.2s;
}

.search-bar input:focus {
  box-shadow: 0 0 10px rgba(124,92,255,0.3);
  transform: scale(1.01);
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  border: 1px solid #e7e3ff;
  margin-bottom: 15px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(124,92,255,0.15);
}

.title {
  font-weight: bold;
  color: #7c5cff;
  margin-bottom: 10px;
}

/* ANIMATION */
.fade-out {
  opacity: 0;
  transform: translateY(10px);
  transition: 0.2s;
}

.fade-in {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo" onclick="goHome()">Armigé</div>

    <button class="nav-btn active" data-page="home">Accueil</button>
    <button class="nav-btn" data-page="explore">Explorer</button>
    <button class="nav-btn" data-page="messages">Messages</button>
    <button class="nav-btn" data-page="profile">Profil</button>

    <hr>

    <button class="nav-btn" data-page="actualites">Actualités</button>
    <button class="nav-btn" data-page="culture">Culture</button>
    <button class="nav-btn" data-page="divertissement">Divertissement</button>
    <button class="nav-btn" data-page="apps">Autres Apps</button>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">

    <div class="search-bar">
      <input type="text" placeholder="Rechercher sur Armigé..." oninput="searchContent(this.value)">
    </div>

    <div class="card">
      <div class="title">Accueil</div>
      <div>Bienvenue sur Armigé.</div>
    </div>

    <div class="card">
      <div class="title">Actualité</div>
      <div>Nouvelle mise à jour du réseau.</div>
    </div>

    <div class="card">
      <div class="title">Culture</div>
      <div>Art et création numérique.</div>
    </div>

  </div>

</div>

<script>

const buttons = document.querySelectorAll(".nav-btn");
const content = document.getElementById("content");

/* NAVIGATION */
const pages = {
  home: "Accueil",
  explore: "Explorer",
  messages: "Messages",
  profile: "Profil",
  actualites: "Actualités",
  culture: "Culture",
  divertissement: "Divertissement",
  apps: "Autres Apps"
};

buttons.forEach(btn => {
  btn.addEventListener("click", () => {

    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    loadPage(btn.dataset.page);
  });
});

/* LOAD PAGE */
function loadPage(page) {

  content.classList.add("fade-out");

  setTimeout(() => {

    content.innerHTML = `
      <div class="search-bar">
        <input type="text" placeholder="Rechercher sur Armigé..." oninput="searchContent(this.value)">
      </div>

      <div class="card">
        <div class="title">${pages[page]}</div>
        <div>Contenu de la page ${page}</div>
      </div>

      <div class="card">
        <div class="title">Exemple contenu</div>
        <div>Information liée à ${page}</div>
      </div>
    `;

    content.classList.remove("fade-out");
    content.classList.add("fade-in");

    setTimeout(() => {
      content.classList.remove("fade-in");
    }, 300);

  }, 200);
}

/* LOGO HOME */
function goHome() {
  buttons.forEach(b => b.classList.remove("active"));
  document.querySelector('[data-page="home"]').classList.add("active");
  loadPage("home");
}

/* SEARCH FUNCTION */
function searchContent(query) {

  const cards = document.querySelectorAll(".card");
  query = query.toLowerCase();

  cards.forEach(card => {

    const text = card.innerText.toLowerCase();

    if (text.includes(query)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }

  });
}

</script>

</body>
</html>
