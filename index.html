<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>

/* 🌈 BACKGROUND */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f4f7ff, #eaf0ff, #ffffff);
  color: #111;
  overflow-x: hidden;
}

/* 💎 GLASS */
.glass {
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(0,0,0,0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* 🔐 LOGIN */
#loginScreen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #eef3ff, #ffffff);
  animation: fadeIn 0.6s ease;
}

#loginBox {
  width: 360px;
  padding: 40px;
  text-align: center;
  animation: pop 0.5s ease;
}

#loginTitle {
  font-size: 28px;
  font-weight: bold;
}

#loginSubtitle {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 20px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(0,0,0,0.05);
  margin-top: 10px;
  transition: 0.2s;
}

input:focus {
  transform: scale(1.02);
}

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: #111;
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

/* 🌐 APP */
#app {
  display: none;
  animation: fadeIn 0.5s ease;
}

/* HEADER */
header {
  padding: 18px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* 📂 SIDEBAR (desktop) */
.sidebar {
  position: fixed;
  left: 20px;
  top: 90px;
  width: 200px;
  padding: 15px;
}

.category {
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.category:hover {
  transform: scale(1.05);
  background: rgba(0,0,0,0.06);
}

/* 📰 MAIN */
.container {
  max-width: 700px;
  margin-left: 240px;
  padding: 20px;
}

/* SEARCH */
.searchBar {
  margin-bottom: 15px;
}

.searchBar input {
  width: 100%;
}

/* POST */
.post {
  margin-top: 12px;
  padding: 15px;
  animation: fadeUp 0.4s ease;
  transition: 0.2s;
}

.post:hover {
  transform: scale(1.01);
}

.username {
  color: #2b6cff;
  font-weight: bold;
}

.meta {
  font-size: 11px;
  opacity: 0.5;
}

/* 📱 MOBILE BAR */
.mobileBar {
  display: none;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes fadeUp {
  from {transform: translateY(10px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}

@keyframes pop {
  from {transform: scale(0.9); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

/* 📱 RESPONSIVE */
@media (max-width: 768px) {

  .sidebar {
    display: none;
  }

  .container {
    margin-left: 0;
    padding-bottom: 80px;
  }

  .mobileBar {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
    justify-content: space-around;
    padding: 10px;
  }

  .mobileBar div {
    font-size: 12px;
  }
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
  <div id="loginBox" class="glass">
    <div id="loginTitle">Armigé Social</div>
    <div id="loginSubtitle">Connecte-toi</div>

    <input id="loginInput" placeholder="Pseudo">
    <button onclick="login()">Entrer</button>
  </div>
</div>

<!-- 🌐 APP -->
<div id="app">

<header class="glass">Armigé Social</header>

<!-- 📂 SIDEBAR -->
<div class="sidebar glass">
  <div class="category">🏠 Accueil</div>
  <div class="category">🔥 Tendances</div>
  <div class="category">📰 Actualités</div>
  <div class="category">🎮 Gaming</div>
  <div class="category">🎵 Musique</div>
</div>

<!-- 📰 MAIN -->
<div class="container">

  <!-- 🔍 SEARCH -->
  <div class="searchBar glass">
    <input placeholder="Rechercher un utilisateur...">
  </div>

  <div class="postBox glass">
    <p id="userDisplay"></p>
    <input id="postInput" placeholder="Exprime-toi...">
    <button onclick="addPost()">Publier</button>
  </div>

  <div id="feed"></div>

</div>

<!-- 📱 MOBILE BAR -->
<div class="mobileBar glass">
  <div>🏠</div>
  <div>🔥</div>
  <div>➕</div>
  <div>🔍</div>
  <div>👤</div>
</div>

</div>

<script>

let user = null;

/* LOGIN */
function login() {
  const input = document.getElementById("loginInput");
  if (!input.value.trim()) return;

  user = input.value.trim();
  localStorage.setItem("user", user);

  startApp();
}

/* AUTO LOGIN */
window.onload = function () {
  const saved = localStorage.getItem("user");
  if (saved) {
    user = saved;
    startApp();
  }
};

function startApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userDisplay").textContent =
    "Connecté : " + user;

  renderPosts();
}

/* POSTS */
function getPosts() {
  return JSON.parse(localStorage.getItem("posts")) || [];
}

function savePosts(posts) {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function addPost() {
  const input = document.getElementById("postInput");
  if (!input.value.trim()) return;

  let posts = getPosts();

  posts.unshift({
    user: user,
    text: input.value.trim(),
    time: new Date().toLocaleString()
  });

  savePosts(posts);
  input.value = "";
  renderPosts();
}

function renderPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  let posts = getPosts();

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post glass";

    div.innerHTML = `
      <div class="username">${p.user}</div>
      <div>${p.text}</div>
      <div class="meta">${p.time}</div>
    `;

    feed.appendChild(div);
  });
}

</script>

</body>
</html>
