<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Armigé Social</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #f6f4ff;
  animation: pageIn 0.35s ease;
}

/* ANIMATIONS */
@keyframes pageIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  50% { transform: scale(1.05); }
}

@keyframes load {
  0% { left: -50%; }
  50% { left: 25%; }
  100% { left: 100%; }
}

/* LOADER */
#loader {
  position: fixed;
  inset: 0;
  background: #f6f4ff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.loader-box {
  text-align: center;
}

.logo-load {
  font-size: 30px;
  font-weight: bold;
  color: #7c5cff;
  animation: pulse 1.5s infinite;
}

.bar {
  width: 200px;
  height: 6px;
  background: #e7e3ff;
  margin-top: 15px;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.bar::after {
  content: "";
  position: absolute;
  width: 50%;
  height: 100%;
  background: #7c5cff;
  animation: load 1s infinite;
}

/* LAYOUT */
.app {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 240px;
  background: white;
  border-right: 1px solid #e7e3ff;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #7c5cff;
  cursor: pointer;
  transition: 0.2s;
}

.logo:hover {
  transform: scale(1.05);
}

.nav-btn {
  padding: 12px;
  border: none;
  background: transparent;
  text-align: left;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.nav-btn:hover {
  background: #f0ecff;
  transform: translateX(4px);
}

.nav-btn.active {
  background: #7c5cff;
  color: white;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
}

/* SEARCH */
.search-bar input {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: 2px solid #7c5cff;
  margin-bottom: 25px;
}

/* TITLES */
.title {
  font-weight: bold;
  color: #7c5cff;
  margin-bottom: 10px;
}

/* ARTICLES */
.article-line {
  padding: 15px 10px;
  border-bottom: 1px solid #ddd;
  cursor: pointer;
  animation: cardIn 0.3s ease;
}

.article-line:hover {
  background: #f4f1ff;
}

/* RECO */
.reco-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.video {
  cursor: pointer;
  animation: cardIn 0.3s ease;
}

.thumbnail {
  width: 100%;
  height: 150px;
  background: #ddd;
  border-radius: 12px;
  transition: 0.2s;
}

.video:hover .thumbnail {
  transform: scale(1.03);
}

.video-title {
  margin-top: 8px;
  font-weight: bold;
}

/* PROFILE */
.profile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 14px;
  border: 1px solid #e7e3ff;
  transition: 0.25s;
}

/* HOVER */
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 20px rgba(124,92,255,0.18);
}

.input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.save-btn {
  margin-top: 10px;
  padding: 10px;
  background: #7c5cff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* NON DEV */
.not-developed {
  font-size: 14px;
  color: #555;
}

.franc {
  color: #7c5cff;
  font-weight: bold;
}

</style>
</head>

<body>

<div id="loader">
  <div class="loader-box">
    <div class="logo-load">Armigé</div>
    <div class="bar"></div>
  </div>
</div>

<div class="app">

<div class="sidebar">
  <div class="logo" onclick="goHome()">Armigé</div>

  <button class="nav-btn active" data-page="home">Accueil</button>
  <button class="nav-btn" data-page="explore">Explorer</button>
  <button class="nav-btn" data-page="messages">Messages</button>
  <button class="nav-btn" data-page="profile">Profil</button>

  <hr>

  <button class="nav-btn" data-page="actualites">Actualités</button>
  <button class="nav-btn" data-page="culture">Culture</button>
  <button class="nav-btn" data-page="divertissement">Divertissement</button>
  <button class="nav-btn" data-page="apps">Autres Apps</button>
</div>

<div class="content" id="content"></div>

</div>

<script>

/* LOADER */
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
}, 900);

/* NAV */
const buttons = document.querySelectorAll(".nav-btn");
const content = document.getElementById("content");

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadPage(btn.dataset.page);
  });
});

/* ACCUEIL */
function renderHome() {
  content.innerHTML = `
    <div class="search-bar">
      <input placeholder="Recherche...">
    </div>

    <div class="title">Articles</div>

    <div class="article-line">
      <b>Titre d'article 1</b><br>
      Résumé de contenu rédigé sur la plateforme.
    </div>

    <div class="article-line">
      <b>Titre d'article 2</b><br>
      Analyse, culture et information.
    </div>

    <div class="title" style="margin-top:30px;">Recommandations</div>

    <div class="reco-grid">
      <div class="video">
        <div class="thumbnail"></div>
        <div class="video-title">Vidéo 1</div>
      </div>

      <div class="video">
        <div class="thumbnail"></div>
        <div class="video-title">Vidéo 2</div>
      </div>
    </div>
  `;
}

/* PROFILE */
function renderProfile() {

  const name = localStorage.getItem("armige_name") || "Invité";
  const lang = localStorage.getItem("armige_lang") || "Français";

  content.innerHTML = `
    <div class="card">
      <div class="title">Compte</div>

      Nom :
      <input class="input" id="nameInput" value="${name}"><br><br>

      Langue :
      <input class="input" id="langInput" value="${lang}"><br><br>

      <button class="save-btn" onclick="saveProfile()">Enregistrer</button>
    </div>

    <div class="profile-grid">
      <div class="card"><div class="title">Historique</div><div>Aucune activité.</div></div>
      <div class="card"><div class="title">Publications</div><div>Aucune publication.</div></div>
      <div class="card"><div class="title">Contacts</div><div>Aucun contact.</div></div>
      <div class="card"><div class="title">Préférences</div><div>Paramètres utilisateur</div></div>
      <div class="card"><div class="title">Abonnements</div><div>Aucun abonnement</div></div>
    </div>
  `;
}

function saveProfile() {
  localStorage.setItem("armige_name", document.getElementById("nameInput").value);
  localStorage.setItem("armige_lang", document.getElementById("langInput").value);
  alert("Profil mis à jour !");
}

/* ROUTER */
function loadPage(page) {
  if (page === "home") return renderHome();
  if (page === "profile") return renderProfile();

  content.innerHTML = `
    <div class="card">
      <div class="not-developed">
        *Page non-développée*<br><br>
        Désolé, mais cette page n'est pas développée.<br>
        Son fonctionnement est annoncé pour prochainement.<br><br>
        - <span class="franc">Franc Suisse</span> -
      </div>
    </div>
  `;
}

/* ✅ FIX LOGO */
function goHome() {

  document.querySelectorAll(".nav-btn").forEach(b => {
    b.classList.remove("active");
  });

  document.querySelector('[data-page="home"]').classList.add("active");

  loadPage("home");
}

loadPage("home");

</script>

</body>
</html>
